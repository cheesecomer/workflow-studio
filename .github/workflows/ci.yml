on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: workflow_studio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d workflow_studio"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/workflow_studio

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm db:generate

      - run: pnpm db:build

      - run: pnpm db:migrate

      - run: pnpm db:seed

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm test:cov

      - run: pnpm --filter api test:e2e
