services:
  web:
    build: .
    working_dir: /app
    volumes:
      - .:/app
      - pnpm-store:/pnpm/store
    ports:
      - '3100:3000'
    environment:
      PNPM_HOME: /pnpm
      PATH: /pnpm:$PATH
      COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
      NEXT_PUBLIC_API_URL: http://api:3000
    command: sh -c "pnpm --filter web dev --hostname 0.0.0.0"
    depends_on:
      api:
        condition: service_healthy

  api:
    build: .
    working_dir: /app
    volumes:
      - .:/app
      - pnpm-store:/pnpm/store
    ports:
      - '3101:3000'
    environment:
      PNPM_HOME: /pnpm
      PATH: /pnpm:$PATH
      COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
      DATABASE_URL: postgresql://postgres:postgres@db:5432/workflow_studio
      TEST_DATABASE_URL: postgresql://postgres:postgres@db:5432/workflow_studio_test
    command: sh -c "pnpm install && pnpm db:generate && pnpm db:build && pnpm --filter api start:dev"
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      - db

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workflow_studio
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
  pnpm-store:
